<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistem Manajemen Akademik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa; /* bg-light bawaan bootstrap */
        }
        .navbar { margin-bottom: 30px; }
        .card { border: none; border-radius: 10px; }
    </style>
    <script>
        function confirmDelete(message) {
            return confirm(message || "Apakah Anda yakin ingin menghapus data ini?");
        }
    </script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" th:href="@{/}">
            <i class="bi bi-layers-half"></i> EduManage
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link px-3" th:href="@{/instructors}"><i class="bi bi-person-video3"></i> Instructors</a></li>
                <li class="nav-item"><a class="nav-link px-3" th:href="@{/courses}"><i class="bi bi-book"></i> Courses</a></li>
                <li class="nav-item"><a class="nav-link px-3" th:href="@{/students}"><i class="bi bi-people"></i> Students</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <th:block th:replace="~{:: content}" />
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
