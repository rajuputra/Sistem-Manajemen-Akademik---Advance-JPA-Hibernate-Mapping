<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout}">
<th:block th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm mb-5">
                <div class="card-header bg-white border-bottom p-4 d-flex justify-content-between align-items-center">
                    <h4 class="fw-bold mb-0 text-dark">Tambah Instructor Baru</h4>
                    <a th:href="@{/instructors}" class="btn-close" aria-label="Close"></a>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/instructors/save}" method="post" th:object="${instructor}">

                        <h6 class="text-uppercase text-primary fw-bold mb-3">Informasi Utama</h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-muted">First Name</label>
                                <input type="text" class="form-control bg-light" th:field="*{firstName}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-muted">Last Name</label>
                                <input type="text" class="form-control bg-light" th:field="*{lastName}" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold text-muted">Email</label>
                            <input type="email" class="form-control bg-light" th:field="*{email}" required>
                        </div>

                        <hr class="my-4 text-muted">

                        <h6 class="text-uppercase text-primary fw-bold mb-3">Instructor Detail</h6>
                        <div class="mb-4">
                            <label class="form-label fw-semibold text-muted">Youtube Channel</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light text-danger"><i class="bi bi-youtube"></i></span>
                                <input type="text" class="form-control bg-light" name="youtubeChannel" placeholder="Cth: @NamaChannel" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold text-muted">Hobby</label>
                            <input type="text" class="form-control bg-light" name="hobby" placeholder="Membaca, Coding, dll." required>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-5">
                            <a th:href="@{/instructors}" class="btn btn-light px-4">Batal</a>
                            <button type="submit" class="btn btn-primary px-4"><i class="bi bi-save"></i> Simpan Data</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</th:block>
</html>
