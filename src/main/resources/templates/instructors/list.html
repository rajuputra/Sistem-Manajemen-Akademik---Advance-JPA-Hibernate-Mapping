<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout}">
<th:block th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark mb-0">Daftar Instructor</h2>
        <a th:href="@{/instructors/new}" class="btn btn-primary rounded-pill px-4">
            <i class="bi bi-plus-lg"></i> Tambah Instructor
        </a>
    </div>

    <div th:if="${param.error}" class="alert alert-danger shadow-sm border-0 alert-dismissible fade show">
        <i class="bi bi-exclamation-triangle"></i> Data tidak ditemukan.
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4">ID</th>
                        <th>Nama</th>
                        <th>Email</th>
                        <th class="text-end pe-4">Aksi</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="instructor : ${instructors}">
                        <td class="ps-4 fw-medium text-muted" th:text="${instructor.id}">1</td>
                        <td class="fw-bold" th:text="${instructor.firstName + ' ' + instructor.lastName}">Nama</td>
                        <td class="text-muted" th:text="${instructor.email}">email</td>
                        <td class="text-end pe-4">
                            <a th:href="@{/instructors/{id}(id=${instructor.id})}" class="btn btn-sm btn-light text-primary" title="Detail">
                                <i class="bi bi-eye"></i>
                            </a>
                            <form th:action="@{/instructors/delete/{id}(id=${instructor.id})}" method="post" style="display:inline-block" onsubmit="return confirmDelete('Hapus instructor ini?')">
                                <button type="submit" class="btn btn-sm btn-light text-danger" title="Hapus">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</th:block>
</html>
