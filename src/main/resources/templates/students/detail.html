<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout}">
<th:block th:fragment="content">

  <div class="mb-4 d-flex align-items-center gap-3">
    <a th:href="@{/students}" class="btn btn-light text-secondary rounded-circle p-2 lh-1"><i class="bi bi-arrow-left"></i></a>
    <h2 class="fw-bold mb-0 text-dark">Detail Student</h2>
  </div>

  <div class="row g-4">
    <div class="col-lg-4">
      <div class="card shadow-sm border-0 mb-4">
        <div class="card-body text-center p-4">
          <div class="bg-warning text-dark rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3" style="width: 80px; height: 80px;">
            <i class="bi bi-person-badge display-5"></i>
          </div>
          <h4 class="fw-bold mb-1" th:text="${student.firstName + ' ' + student.lastName}">Nama Student</h4>
          <p class="text-muted mb-0"><i class="bi bi-envelope me-1"></i> <span th:text="${student.email}">email</span></p>
        </div>
      </div>
    </div>

    <div class="col-lg-8">
      <div class="card shadow-sm">
        <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
          <h6 class="fw-bold mb-0"><i class="bi bi-journal-bookmark"></i> Courses yang Diikuti</h6>
          <span class="badge bg-warning text-dark rounded-pill" th:text="${#lists.size(student.courses)}">0</span>
        </div>
        <div class="card-body p-0">
          <ul class="list-group list-group-flush" th:if="${not #lists.isEmpty(student.courses)}">
            <li class="list-group-item px-4 py-3 d-flex align-items-center gap-3" th:each="course : ${student.courses}">
              <i class="bi bi-bookmark-check-fill text-warning"></i>
              <span class="fw-semibold" th:text="${course.title}">Course</span>
            </li>
          </ul>
          <div class="p-5 text-center text-muted" th:if="${#lists.isEmpty(student.courses)}">
            <i class="bi bi-clipboard-x fs-1 d-block mb-2 text-light"></i> Siswa ini belum terdaftar di course apapun.
          </div>
        </div>
      </div>
    </div>
  </div>

</th:block>
</html>
